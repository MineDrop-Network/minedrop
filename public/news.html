<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — MineDrop</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --lime: #C8FF00; --orange: #FF6B00; --purple: #8B5CF6; --pink: #FF2D78;
      --bg: #0C0C0E; --bg2: #111114; --bg3: #18181D;
      --white: #F2F2F4; --muted: #5A5A72; --border: rgba(255,255,255,0.07); --radius: 12px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 2.5rem; background: rgba(12,12,14,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Space Mono', monospace; font-size: 0.95rem; font-weight: 700; color: var(--lime); text-decoration: none; letter-spacing: 0.04em; }
    .nav-links { display: flex; gap: 0.25rem; list-style: none; align-items: center; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 500; padding: 0.45rem 0.9rem; border-radius: 6px; transition: color 0.15s, background 0.15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--white); background: rgba(255,255,255,0.05); }
    .nav-links a.nav-store { color: var(--lime); border: 1px solid rgba(200,255,0,0.25); }
    .nav-links a.nav-store:hover { background: rgba(200,255,0,0.08); }
    .nav-cta { background: var(--lime); color: var(--bg); border: none; padding: 0.55rem 1.3rem; font-family: 'Space Mono', monospace; font-size: 0.72rem; font-weight: 700; border-radius: 6px; cursor: pointer; transition: opacity 0.15s, transform 0.15s; }
    .nav-cta:hover { opacity: 0.88; transform: translateY(-1px); }

    .ticker { background: var(--lime); color: var(--bg); padding: 0.55rem 0; overflow: hidden; white-space: nowrap; padding-top: calc(0.55rem + 56px); }
    .ticker-inner { display: inline-block; animation: ticker 22s linear infinite; font-family: 'Space Mono', monospace; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; }
    @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    .page-hero { padding: 5rem 2rem 3.5rem; text-align: center; position: relative; overflow: hidden; }
    .page-hero::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 700px; height: 350px; background: radial-gradient(ellipse, rgba(255,107,0,0.06) 0%, transparent 70%); pointer-events: none; }
    .page-eyebrow { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; font-weight: 600; color: var(--orange); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 1.4rem; padding: 0.35rem 0.9rem; border: 1px solid rgba(255,107,0,0.25); border-radius: 100px; background: rgba(255,107,0,0.06); opacity: 0; animation: fadeUp 0.5s 0.2s ease forwards; }
    .page-title { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 1rem; opacity: 0; animation: fadeUp 0.5s 0.35s ease forwards; }
    .page-sub { font-size: 1rem; color: var(--muted); max-width: 500px; margin: 0 auto; line-height: 1.75; opacity: 0; animation: fadeUp 0.5s 0.5s ease forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .news-section { padding: 2rem 2rem 6rem; }
    .news-container { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; align-items: start; }
    @media (max-width: 720px) { .news-container { grid-template-columns: 1fr; } }

    /* FEATURED */
    .news-featured { background: var(--bg2); border: 1px solid rgba(200,255,0,0.12); border-radius: var(--radius); overflow: hidden; opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .news-featured.visible { opacity: 1; transform: translateY(0); }
    .featured-banner { height: 180px; background: linear-gradient(135deg, rgba(200,255,0,0.07), rgba(139,92,246,0.1)); display: flex; align-items: center; justify-content: center; font-size: 4rem; border-bottom: 1px solid var(--border); overflow: hidden; }
    .featured-body { padding: 2rem; }

    .post-tag { font-family: 'Space Mono', monospace; font-size: 0.6rem; font-weight: 700; padding: 0.3rem 0.7rem; letter-spacing: 0.06em; display: inline-block; margin-bottom: 1rem; border-radius: 4px; }
    .tag-update { background: rgba(200,255,0,0.12); color: var(--lime); }
    .tag-event  { background: rgba(255,45,120,0.12); color: var(--pink); }
    .tag-patch  { background: rgba(139,92,246,0.12); color: var(--purple); }
    .tag-news   { background: rgba(255,107,0,0.12); color: var(--orange); }

    .post-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.75rem; line-height: 1.4; }
    .post-excerpt { font-size: 0.9rem; color: var(--muted); line-height: 1.75; margin-bottom: 1.5rem; }
    .post-meta { display: flex; align-items: center; gap: 1rem; font-size: 0.78rem; color: var(--muted); }
    .post-read-btn { background: transparent; color: var(--lime); border: 1px solid rgba(200,255,0,0.3); padding: 0.45rem 1rem; font-size: 0.78rem; font-weight: 600; border-radius: 6px; cursor: pointer; transition: background 0.15s, border-color 0.15s; margin-left: auto; }
    .post-read-btn:hover { background: rgba(200,255,0,0.07); border-color: var(--lime); }

    /* POST LIST */
    .news-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-top: 1rem; }
    .news-item { background: var(--bg2); padding: 1.3rem 1.5rem; position: relative; cursor: default; opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease, background 0.2s; }
    .news-item.visible { opacity: 1; transform: translateY(0); }
    .news-item:hover { background: var(--bg3); }
    .news-item::before { content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 3px; background: var(--accent, var(--lime)); }
    .news-item-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; padding-left: 0.3rem; }
    .news-item-meta { display: flex; align-items: center; gap: 0.8rem; padding-left: 0.3rem; }
    .news-item-date { font-size: 0.75rem; color: var(--muted); }

    /* SIDEBAR */
    .news-sidebar { display: flex; flex-direction: column; gap: 1rem; }
    .sidebar-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .sidebar-box.visible { opacity: 1; transform: translateY(0); }
    .sidebar-title { font-family: 'Space Mono', monospace; font-size: 0.65rem; font-weight: 700; color: var(--lime); letter-spacing: 0.12em; margin-bottom: 1.2rem; display: block; }

    .changelog-list { list-style: none; display: flex; flex-direction: column; gap: 0.9rem; }
    .changelog-list li { font-size: 0.83rem; color: var(--muted); line-height: 1.55; padding-left: 1rem; position: relative; }
    .changelog-list li::before { content: '•'; position: absolute; left: 0; color: var(--lime); }
    .changelog-list li strong { color: var(--white); font-weight: 600; display: block; font-size: 0.78rem; }

    .season-bar { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; text-align: center; margin-bottom: 1rem; }
    .season-label { font-family: 'Space Mono', monospace; font-size: 0.55rem; font-weight: 700; color: var(--muted); letter-spacing: 0.12em; display: block; margin-bottom: 0.6rem; }
    .season-progress { height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
    .season-progress-fill { height: 100%; background: linear-gradient(to right, var(--lime), #d9ff33); width: 0%; transition: width 1.5s ease; border-radius: 3px; }
    .season-pct { font-family: 'Space Mono', monospace; font-size: 0.65rem; font-weight: 700; color: var(--lime); display: block; margin-top: 0.6rem; }

    footer { background: var(--bg); border-top: 1px solid var(--border); padding: 1.8rem 2.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .footer-logo { font-family: 'Space Mono', monospace; font-size: 0.78rem; font-weight: 700; color: var(--lime); }
    .footer-note { font-size: 0.75rem; color: var(--muted); }

    @media (max-width: 600px) { nav { padding: 1rem 1.2rem; } .nav-links { display: none; } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">MineDrop</a>
  <ul class="nav-links">
    <li><a href="news.html" class="active">News</a></li>
    <li><a href="rules.html">Rules</a></li>
    <li><a href="discord.html">Discord</a></li>
    <li><a href="store.html" class="nav-store">Store</a></li>
  </ul>
  <button class="nav-cta" onclick="window.location.href='play.html'">PLAY NOW</button>
</nav>

<div class="ticker" aria-hidden="true">
  <span class="ticker-inner" id="tickerInner"></span>
</div>

<div class="page-hero">
  <div class="page-eyebrow" id="heroEyebrow"></div>
  <h1 class="page-title" id="heroTitle"></h1>
  <p class="page-sub" id="heroSub"></p>
</div>

<section class="news-section">
  <div class="news-container">
    <div>
      <div class="news-featured" id="feat"></div>
      <div class="news-list" id="newsList" style="margin-top: 1rem;"></div>
    </div>

    <div class="news-sidebar">
      <div class="sidebar-box">
        <span class="sidebar-title">🗓 Season Progress</span>
        <div class="season-bar">
          <span class="season-label">DAYS ELAPSED</span>
          <div class="season-progress"><div class="season-progress-fill" id="s1bar"></div></div>
          <span class="season-pct" id="s1pct">—</span>
        </div>
        <p id="sb-season-desc-txt" style="font-size:0.83rem; color:var(--muted); line-height:1.65;"></p>
      </div>

      <div class="sidebar-box">
        <span class="sidebar-title">🔧 Recent Changes</span>
        <ul class="changelog-list" id="changelog-list"></ul>
      </div>

      <div class="sidebar-box" style="text-align:center; background: linear-gradient(135deg, rgba(139,92,246,0.07), rgba(255,45,120,0.05));">
        <span class="sidebar-title" id="sb-cta-title" style="color:var(--purple);"></span>
        <p id="sb-cta-desc" style="font-size:0.83rem; color:var(--muted); line-height:1.65; margin-bottom:1rem;"></p>
        <button id="sb-cta-btn" style="background:var(--purple); color:#fff; border:none; padding:0.7rem 1.2rem; font-family:'Space Mono',monospace; font-size:0.62rem; font-weight:700; border-radius:6px; cursor:pointer; width:100%; transition:opacity 0.15s;" onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1"></button>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="footer-logo">MineDrop</div>
  <p class="footer-note">Not affiliated with Mojang or Microsoft. MineDrop © 2025.</p>
  <p class="footer-note">Discord · Twitter · YouTube</p>
</footer>

<script>
  function getTagStyle(tag) {
    const t = String(tag || '').toUpperCase();
    if (t === 'UPDATE') return { cls: 'tag-update', hex: 'var(--lime)' };
    if (t === 'EVENT')  return { cls: 'tag-event',  hex: 'var(--pink)' };
    if (t === 'PATCH')  return { cls: 'tag-patch',  hex: 'var(--purple)' };
    return { cls: 'tag-news', hex: 'var(--orange)' };
  }

  function initReveal() {
    const revealEls = document.querySelectorAll('.news-featured, .news-item, .sidebar-box');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 70);
          obs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.06 });
    revealEls.forEach(el => obs.observe(el));
  }

  async function loadNewsData() {
    try {
      const [tickerRes, heroRes, annRes, newsRes, sidebarRes] = await Promise.all([
        fetch('/api/ticker'),
        fetch('/api/hero/news'),
        fetch('/api/announcement'),
        fetch('/api/news'),
        fetch('/api/sidebar')
      ]);
      const ticker = await tickerRes.json();
      const hero = await heroRes.json();
      const ann = await annRes.json();
      const news = await newsRes.json();
      const sidebar = await sidebarRes.json();

      // Hero
      if (hero) {
        document.getElementById('heroEyebrow').textContent = hero.eyebrow || '';
        const titleHtml = (hero.title || '').replace(
          hero.titleAccent,
          `<span style="color:var(--lime)">${hero.titleAccent || ''}</span>`
        );
        document.getElementById('heroTitle').innerHTML = titleHtml;
        document.getElementById('heroSub').textContent = hero.subtitle || '';
      }

      // Ticker
      if (ticker) {
        const tickerEl = document.querySelector('.ticker');
        if (ticker.visible) {
          document.getElementById('tickerInner').innerHTML = `${ticker.text} &nbsp; `.repeat(4);
          tickerEl.style.background = ticker.bg;
          tickerEl.style.color = ticker.color;
        } else {
          tickerEl.style.display = 'none';
        }
      }

      // Featured post
      if (ann && Object.keys(ann).length > 0) {
        const annStyle = getTagStyle(ann.tag);
        let bannerContent = '🎉';
        if (ann.banner) {
          if (ann.banner.startsWith('http') || ann.banner.startsWith('/')) {
            bannerContent = `<img src="${ann.banner}" style="width: 100%; height: 100%; object-fit: cover;">`;
          } else {
            bannerContent = ann.banner;
          }
        }

        document.getElementById('feat').innerHTML = `
          <div class="featured-banner">${bannerContent}</div>
          <div class="featured-body">
            <span class="post-tag ${annStyle.cls}">${ann.tag || 'UPDATE'}</span>
            <div class="post-title">${ann.title || ''}</div>
            <p class="post-excerpt">${ann.desc || ''}</p>
            <div class="post-meta">
              <span class="post-date">📅 ${ann.date || ''}</span>
              ${ann.link ? `<button class="post-read-btn" onclick="window.location.href='${ann.link}'">READ MORE →</button>` : ''}
            </div>
          </div>
        `;
      }

      // News list
      if (news && news.length > 0) {
        document.getElementById('newsList').innerHTML = news.map(n => {
          const style = getTagStyle(n.tag);
          return `
            <div class="news-item" style="--accent: ${style.hex};">
              <span class="post-tag ${style.cls}">${n.tag}</span>
              <div class="news-item-title">${n.title}</div>
              <div class="news-item-meta"><span class="news-item-date">📅 ${n.date}</span></div>
            </div>
          `;
        }).join('');
      }

      // Sidebar
      if (sidebar && Object.keys(sidebar).length > 0) {
        document.getElementById('s1pct').textContent = sidebar.seasonText || `${sidebar.seasonPct || 0}% complete`;
        document.getElementById('sb-season-desc-txt').textContent = sidebar.seasonDesc || '';
        setTimeout(() => {
          document.getElementById('s1bar').style.width = `${sidebar.seasonPct || 0}%`;
        }, 400);

        const clList = document.getElementById('changelog-list');
        if (sidebar.changelog) {
          clList.innerHTML = sidebar.changelog.map(c =>
            `<li><strong>${c.version}</strong> ${c.desc}</li>`
          ).join('');
        }

        document.getElementById('sb-cta-title').textContent = sidebar.ctaTitle || '';
        document.getElementById('sb-cta-desc').textContent = sidebar.ctaDesc || '';
        const ctaBtn = document.getElementById('sb-cta-btn');
        ctaBtn.textContent = sidebar.ctaBtn || '';
        ctaBtn.onclick = () => window.location.href = sidebar.ctaLink || '#';
      }

      initReveal();

    } catch (err) {
      console.error('Failed to load news data:', err);
    }
  }

  loadNewsData();
</script>
</body>
</html>
